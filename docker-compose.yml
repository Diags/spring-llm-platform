services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litellm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"          # exposé en local pour debug ; en prod : ClusterIP interne uniquement
    volumes:
      - ./litellm/litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?definir LITELLM_MASTER_KEY dans .env}
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD:-litellm}@postgres:5432/litellm
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AZURE_API_KEY: ${AZURE_API_KEY:-}
      AZURE_API_BASE: ${AZURE_API_BASE:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:4000/health/liveliness').status==200 else sys.exit(1)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  ai-service:
    build: ./ai-service
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_healthy
    environment:
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_VIRTUAL_KEY: ${AI_SERVICE_VIRTUAL_KEY:?definir AI_SERVICE_VIRTUAL_KEY dans .env}
    ports:
      - "8081:8080"          # exposé pour debug ; en prod, seul le gateway est exposé
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health/liveness"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  gateway:
    build: ./gateway
    restart: unless-stopped
    depends_on:
      ai-service:
        condition: service_healthy
    environment:
      AI_SERVICE_URL: http://ai-service:8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  pgdata:
