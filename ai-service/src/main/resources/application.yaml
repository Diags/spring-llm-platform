# ============================================================
# ai-service — Spring Boot + Spring AI, client de LiteLLM
# ============================================================

server:
  port: 8080

spring:
  application:
    name: ai-service
  ai:
    retry:
      max-attempts: 1            # AUCUN retry Java : les retries vivent dans LiteLLM (num_retries)
    openai:
      # Spring AI ajoute lui-meme /v1/chat/completions : base-url SANS /v1
      base-url: ${LITELLM_BASE_URL:http://localhost:4000}
      api-key: ${LITELLM_VIRTUAL_KEY:sk-dev}
      chat:
        options:
          model: gpt-fast          # alias LiteLLM — jamais un nom de provider
          temperature: 0.2

resilience4j:
  circuitbreaker:
    instances:
      litellm:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
  timelimiter:
    instances:
      litellm:
        timeout-duration: 15s      # classification synchrone uniquement
        # PAS de timeout sur le streaming : un stream legitime peut durer > 60s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true              # /actuator/health/liveness et /readiness pour K8s

