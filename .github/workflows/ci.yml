name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ai-service:
    name: ai-service — tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Tests (WireMock, sans vrai LLM)
        run: mvn -B verify --file ai-service/pom.xml

  gateway:
    name: gateway — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build
        run: mvn -B package --file gateway/pom.xml

  images-docker:
    name: images Docker — build
    runs-on: ubuntu-latest
    needs: [ai-service, gateway]
    steps:
      - uses: actions/checkout@v4
      - name: Build ai-service
        run: docker build ./ai-service
      - name: Build gateway
        run: docker build ./gateway
